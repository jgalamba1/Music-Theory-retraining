name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Install adaptive icon files
        run: |
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/values

          echo '<?xml version="1.0" encoding="utf-8"?><adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@color/ic_launcher_background"/><foreground android:drawable="@drawable/ic_launcher_foreground"/></adaptive-icon>' \
            > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml

          cp android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml \
             android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

          echo '<?xml version="1.0" encoding="utf-8"?><resources><color name="ic_launcher_background">#18253d</color></resources>' \
            > android/app/src/main/res/values/ic_launcher_background.xml

          cp icon.svg android/app/src/main/res/drawable/ic_launcher_foreground.xml

      - name: Decode keystore from secret
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/music-theory-release.jks

      - name: Configure signing in build.gradle
        run: |
          cat >> android/app/build.gradle << 'GRADLEOF'
          android {
            signingConfigs {
              release {
                storeFile file("../music-theory-release.jks")
                storePassword System.getenv("KEYSTORE_PASSWORD")
                keyAlias System.getenv("KEY_ALIAS")
                keyPassword System.getenv("KEYSTORE_PASSWORD")
              }
            }
            buildTypes {
              release {
                signingConfig signingConfigs.release
              }
            }
          }
          GRADLEOF

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build signed release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: music-theory-release-signed
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: music-theory-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
