name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Install rsvg-convert
        run: sudo apt-get install -y librsvg2-bin

      - name: Generate icon PNG for @capacitor/assets
        run: |
          mkdir -p assets
          rsvg-convert -w 1024 -h 1024 icon.svg > assets/icon.png
          echo "Icon PNG generated: $(ls -lh assets/icon.png)"

      - name: Generate all Android icon sizes
        run: npx @capacitor/assets generate --android

      - name: Decode keystore from secret
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/music-theory-release.jks

      - name: Configure signing in build.gradle
        run: |
          printf '%s\n' 'android {' '  signingConfigs {' '    release {' '      storeFile file("../music-theory-release.jks")' '      storePassword System.getenv("KEYSTORE_PASSWORD")' '      keyAlias System.getenv("KEY_ALIAS")' '      keyPassword System.getenv("KEYSTORE_PASSWORD")' '    }' '  }' '  buildTypes {' '    release {' '      signingConfig signingConfigs.release' '    }' '  }' '}' >> android/app/build.gradle

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build signed release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: music-theory-release-signed
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: music-theory-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
