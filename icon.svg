<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Navy background with rounded corners -->
  <rect width="1024" height="1024" rx="200" fill="#18253d"/>
  <!-- Subtle inner border -->
  <rect x="18" y="18" width="988" height="988" rx="185" fill="none" stroke="#b07828" stroke-width="14" opacity="0.4"/>

  <!-- ── Treble Clef (gold, left-center) ── -->
  <g transform="translate(310,512)" fill="#b07828">
    <!-- Spiral base -->
    <ellipse cx="0" cy="200" rx="52" ry="38"/>
    <!-- Main stem -->
    <path d="M-8,-270 C-8,-270 -8,280 -8,280 Q-8,300 0,300 Q8,300 8,280 L8,-270 Q8,-280 0,-280 Q-8,-280 -8,-270Z"/>
    <!-- Upper loop -->
    <path d="M0,-260 C60,-260 90,-210 90,-160 C90,-100 50,-60 0,-40 C-50,-60 -80,-100 -80,-160 C-80,-210 -50,-260 0,-260Z M0,-200 C-30,-200 -46,-182 -46,-160 C-46,-130 -22,-106 0,-98 C22,-106 46,-130 46,-160 C46,-182 30,-200 0,-200Z" fill-rule="evenodd"/>
    <!-- Lower curl -->
    <path d="M0,140 C50,140 80,170 80,200 C80,240 50,260 10,260 C-10,260 -28,252 -40,238 C-28,248 -12,254 4,254 C34,254 54,236 54,200 C54,178 36,162 8,162 C-8,162 -20,168 -28,178 C-24,160 -10,140 0,140Z"/>
    <!-- Staff-crossing bulge -->
    <path d="M-80,-40 C-80,-40 -50,-20 0,-20 C50,-20 80,-40 80,-60 C80,-80 50,-100 0,-100 C-50,-100 -80,-80 -80,-60 C-80,-50 -80,-45 -80,-40Z M-40,-60 C-40,-72 -22,-80 0,-80 C22,-80 40,-72 40,-60 C40,-48 22,-40 0,-40 C-22,-40 -40,-48 -40,-60Z" fill-rule="evenodd"/>
  </g>

  <!-- ── Quill Pen (cream/light gold outline, right-center) ── -->
  <g transform="translate(670,500)" stroke="#ddd4c0" stroke-width="18" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <!-- Feather vane - outer shape -->
    <path d="M0,-270 C60,-230 100,-160 100,-80 C100,0 60,60 20,100 L-20,140 C-40,110 -60,70 -60,20 C-60,-60 -30,-160 0,-270 Z"/>
    <!-- Feather spine -->
    <line x1="0" y1="-270" x2="-20" y2="140" stroke-width="12"/>
    <!-- Feather barbs left -->
    <path d="M-10,-200 C-30,-190 -50,-170 -55,-140" stroke-width="10"/>
    <path d="M-12,-150 C-35,-135 -55,-110 -58,-80" stroke-width="10"/>
    <path d="M-14,-100 C-38,-80 -56,-52 -57,-20" stroke-width="10"/>
    <path d="M-16,-50 C-40,-28 -54,4 -52,38" stroke-width="10"/>
    <!-- Feather barbs right -->
    <path d="M4,-210 C30,-195 60,-168 68,-138" stroke-width="10"/>
    <path d="M2,-158 C28,-140 60,-108 65,-76" stroke-width="10"/>
    <path d="M0,-106 C26,-85 56,-50 60,-16" stroke-width="10"/>
    <path d="M-2,-54 C22,-30 48,8 48,44" stroke-width="10"/>
    <!-- Nib -->
    <path d="M-20,140 L-36,190 L-10,170 L10,200 L16,150 Z" stroke-width="14" fill="#ddd4c0" opacity="0.9"/>
    <!-- Nib tip split -->
    <line x1="-10" y1="170" x2="0" y2="200" stroke-width="8"/>
  </g>
</svg>
