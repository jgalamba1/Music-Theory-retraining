    <path d="
      M 0,-260
      C 18,-260 36,-248 44,-228
      C 52,-208 48,-182 36,-160
      C 24,-138 8,-120 0,-100
      C 28,-86 52,-60 62,-28
      C 72,4 68,40 52,68
      C 36,96 10,114 -18,120
      C -14,148 -10,176 -8,204
      C -6,228 -8,252 -20,268
      C -32,284 -52,292 -70,286
      C -88,280 -100,262 -100,244
      C -100,226 -88,210 -72,206
      C -56,202 -40,210 -34,226
      C -28,210 -36,192 -52,186
      C -68,180 -86,190 -94,206
      C -102,222 -98,244 -84,258
      C -70,272 -48,276 -28,268
      C -8,260 6,240 8,218
      C 10,196 6,170 2,146
      C 30,138 56,120 70,94
      C 84,68 86,34 76,-2
      C 66,-38 42,-68 10,-84
      C 22,-108 32,-136 32,-164
      C 32,-192 22,-222 4,-242
      C -4,-252 -14,-260 0,-260
      Z
      M 0,-220
      C 8,-220 14,-212 16,-200
      C 18,-184 12,-164 2,-148
      C -8,-164 -14,-184 -12,-200
      C -10,-212 -6,-220 0,-220
      Z
      M -12,130
      C 12,122 32,102 40,76
      C 48,50 44,20 32,-4
      C 20,-28 2,-46 -16,-56
      C -18,-28 -18,2 -16,30
      C -14,70 -14,104 -12,130
