<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="#18253d"/>

  <!-- Subtle inner glow ring -->
  <rect width="1024" height="1024" rx="220" fill="none" stroke="#b07828" stroke-width="28" stroke-opacity="0.35"/>

  <!-- Staff lines (5 lines, centered) -->
  <g stroke="#4a6080" stroke-width="14" stroke-linecap="round" opacity="0.7">
    <line x1="180" y1="420" x2="844" y2="420"/>
    <line x1="180" y1="476" x2="844" y2="476"/>
    <line x1="180" y1="532" x2="844" y2="532"/>
    <line x1="180" y1="588" x2="844" y2="588"/>
    <line x1="180" y1="644" x2="844" y2="644"/>
  </g>

  <!-- Treble clef (gold) — drawn as a path centered on staff -->
  <g transform="translate(512, 532) scale(1.15)" fill="#b07828">
