    " fill-rule="evenodd"/>
  </g>

  <!-- Gold dot accent bottom right -->
  <circle cx="720" cy="780" r="28" fill="#b07828" opacity="0.8"/>
  <circle cx="780" cy="780" r="18" fill="#b07828" opacity="0.5"/>
</svg>
